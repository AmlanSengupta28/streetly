# OPTIONAL — only needed if you want to run Postgres locally instead of
# using Supabase (the documented default — see README.md). Run:
#   docker compose up -d
# Gives you a Postgres instance with PostGIS enabled for geospatial "nearby" queries.
version: "3.9"
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: streetly
      POSTGRES_PASSWORD: streetly
      POSTGRES_DB: streetly_score
    ports:
      - "5432:5432"
    volumes:
      - streetly_db_data:/var/lib/postgresql/data

volumes:
  streetly_db_data:
